components:
  responses:
    forbidden:
      content:
        application/json:
          example:
            errors:
              detail: Forbidden
          schema:
            type: object
      description: Forbidden
    no_content:
      description: No Content
    not_found:
      content:
        application/json:
          example:
            errors:
              detail: Not Found
          schema:
            type: object
      description: Not Found
    unauthorised:
      content:
        application/json:
          example:
            errors:
              detail: Unauthorised
          schema:
            type: object
      description: Unauthorised
    unprocessable_entity:
      content:
        application/json:
          example:
            errors:
              - detail: can't be blank
                source:
                  pointer: /name
                title: Invalid value
              - detail: should be at most 3 character(s)
                source:
                  pointer: /name
                title: Invalid value
          schema:
            $ref: '#/components/schemas/AlveraAPIError'
      description: |
        Validation or pipeline error. Response body conforms to the
        `AlveraAPIError` schema — a JSON:API-style error object with `errors`
        as a non-empty array of `{detail, source.pointer, title}` entries.

        `title` is the error category / machine-readable code:
        `"Invalid value"` for request-body validation, or a pipeline stage
        code (`"transform_failed"`, `"mdm_input_render_failed"`, etc.) for
        `/run` endpoint errors.

        `source.pointer` is an RFC 6901 JSON Pointer: into the request body
        for validation errors (`/name`, `/template_config/body`), or into the
        failing contract field for pipeline errors.
  schemas:
    ToolRESTAPIResponse:
      allOf:
        - $ref: '#/components/schemas/RESTAPIResponse'
        - properties:
            tool_body_type:
              enum:
                - rest_api
              type: string
          required:
            - tool_body_type
          type: object
      title: ToolRESTAPIResponse
      type: object
    SMSCallRequest:
      description: >-
        SMS tool-call config — Liquid-templated recipient and body plus
        transactional/promotional category. Request
      example:
        body: null
        sms_type: transactional
        to: null
      properties:
        body:
          $ref: '#/components/schemas/TemplateConfigRequest'
        sms_type:
          default: transactional
          description: SMS category — transactional vs promotional
          enum:
            - transactional
            - promotional
          type: string
        to:
          $ref: '#/components/schemas/TemplateConfigRequest'
      required:
        - to
        - body
      title: SMSCallRequest
      type: object
      writeOnly: true
      x-order:
        - to
        - body
        - sms_type
    SQLDatabaseRequest:
      description: >-
        SQL database connection configuration (PostgreSQL, MySQL, MSSQL, SQLite,
        Snowflake). Request
      example:
        base_query: {}
        db_host: ''
        db_name: ''
        db_type: postgres
        password: ''
        pool_size: 1
        port: 1
        ssl: false
        ssl_mode: ''
        user_name: ''
      properties:
        base_query:
          description: >-
            Liquid template for the base SQL query, merged with per-call vars at
            invocation time
          nullable: true
          type: object
        db_host:
          description: Database host (hostname or IP address)
          type: string
        db_name:
          description: Database name
          type: string
        db_type:
          description: SQL database engine
          enum:
            - postgres
            - mysql
            - mssql
            - sqlite
            - snowflake
          type: string
        password:
          description: Database password
          type: string
          writeOnly: true
        pool_size:
          description: Ecto connection pool size
          maximum: 99
          minimum: 1
          nullable: true
          type: integer
        port:
          description: >-
            Database port (defaults based on db_type: postgres=5432, mysql=3306,
            mssql=1433)
          maximum: 65535
          minimum: 1
          nullable: true
          type: integer
        ssl:
          description: Enable SSL connection
          nullable: true
          type: boolean
        ssl_mode:
          description: SSL mode (e.g., 'require', 'verify-full')
          nullable: true
          type: string
        user_name:
          description: Database username
          type: string
      required:
        - db_type
        - db_name
        - db_host
        - user_name
        - password
      title: SQLDatabaseRequest
      type: object
      writeOnly: true
      x-order:
        - db_type
        - db_name
        - db_host
        - user_name
        - password
        - port
        - ssl
        - ssl_mode
        - pool_size
        - base_query
    DataSourceResponse:
      description: Data source — connection to a third-party system or API
      example:
        datalake: null
        description: ''
        id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        image_url: ''
        inserted_at: '2020-04-20T16:20:00Z'
        is_default: false
        name: ''
        status: draft
        updated_at: '2020-04-20T16:20:00Z'
        uri: ''
      properties:
        datalake:
          $ref: '#/components/schemas/DatalakeResponse'
        description:
          description: Data source description
          nullable: true
          type: string
        id:
          description: Data Source ID
          format: uuid
          type: string
        image_url:
          description: Image URL
          nullable: true
          type: string
        inserted_at:
          description: Creation timestamp
          format: date-time
          type: string
        is_default:
          description: Whether this is the default data source
          type: boolean
        name:
          description: Data source name
          type: string
        status:
          description: Data source status
          enum:
            - draft
            - active
            - inactive
          type: string
        updated_at:
          description: Last update timestamp
          format: date-time
          type: string
        uri:
          description: Data source URI
          type: string
      readOnly: true
      required:
        - name
        - uri
        - status
        - is_default
      title: DataSourceResponse
      type: object
      x-order:
        - id
        - name
        - uri
        - description
        - image_url
        - status
        - is_default
        - datalake
        - inserted_at
        - updated_at
    S3Request:
      description: >-
        S3-compatible storage tool configuration with a nested polymorphic
        provider config (AWS or R2). Request
      example:
        base_prefix: {}
        config:
          access_key_id: ''
          auth_method: access_key
          base_path: ''
          bucket: ''
          endpoint: ''
          region: ''
          secret_access_key: ''
          storage_config_type: aws
      properties:
        base_prefix:
          description: >-
            Liquid template for the base object prefix, merged with per-call
            vars at invocation time
          nullable: true
          type: object
        config:
          discriminator:
            mapping:
              aws: '#/components/schemas/S3CloudStorageAwsRequest'
              r2: '#/components/schemas/S3CloudStorageR2Request'
            propertyName: storage_config_type
          oneOf:
            - $ref: '#/components/schemas/S3CloudStorageAwsRequest'
            - $ref: '#/components/schemas/S3CloudStorageR2Request'
          type: object
          writeOnly: true
      required:
        - config
      title: S3Request
      type: object
      writeOnly: true
      x-order:
        - config
        - base_prefix
    CloudStorageR2Response:
      description: >-
        Cloudflare R2 cloud storage configuration — S3-compatible with auto
        region and account-scoped endpoints.
      example:
        access_key_id: ''
        base_path: ''
        bucket: ''
        endpoint: ''
        region: ''
      properties:
        access_key_id:
          description: R2 access key ID
          type: string
        base_path:
          description: Base path prefix for objects within the bucket
          type: string
        bucket:
          description: R2 bucket name
          type: string
        endpoint:
          description: >-
            Custom R2 endpoint URL (optional, defaults to account-scoped R2
            endpoint)
          nullable: true
          type: string
        region:
          description: R2 region (defaults to "auto")
          type: string
      readOnly: true
      required:
        - bucket
        - access_key_id
      title: CloudStorageR2Response
      type: object
      x-order:
        - region
        - bucket
        - access_key_id
        - endpoint
        - base_path
    ConnectedAppRequest:
      description: >-
        External web application connected to the platform via M2M API key
        Request
      example:
        cloudflare_pages_config:
          account_id: ''
          api_token: ''
          build_command: ''
          destination_dir: ''
          github_auth_method: github_app
          github_pat: ''
          production_branch: ''
          project_name: ''
        description: ''
        mode: managed
        name: ''
        repo_url: ''
        urls:
          - is_primary: false
            label: ''
            url: ''
      properties:
        cloudflare_pages_config:
          description: Cloudflare Pages deployment config (required for managed mode)
          nullable: true
          properties:
            account_id:
              description: Cloudflare account ID
              type: string
            api_token:
              description: Cloudflare API token
              type: string
              writeOnly: true
            build_command:
              description: Build command
              nullable: true
              type: string
            destination_dir:
              description: Build output directory
              nullable: true
              type: string
            github_auth_method:
              description: GitHub auth method
              enum:
                - github_app
                - pat
              type: string
            github_pat:
              description: GitHub PAT (required for pat method)
              nullable: true
              type: string
              writeOnly: true
            production_branch:
              description: Git branch for production
              nullable: true
              type: string
            project_name:
              description: CF Pages project name
              nullable: true
              readOnly: true
              type: string
          required:
            - account_id
          type: object
        description:
          description: Optional description
          nullable: true
          type: string
        mode:
          description: Deployment mode
          enum:
            - managed
            - self_hosted
          type: string
        name:
          description: Display name (unique within datalake)
          type: string
        repo_url:
          description: >-
            GitHub repo URL (required for managed mode, optional for
            self-hosted)
          nullable: true
          type: string
        urls:
          description: >-
            App URLs with primary designation (at least one required for
            self_hosted)
          items:
            properties:
              is_primary:
                description: Whether this is the primary URL
                type: boolean
              label:
                description: Display label
                nullable: true
                type: string
              url:
                description: App URL (http/https)
                type: string
            required:
              - url
            type: object
          type: array
      required:
        - name
        - mode
      title: ConnectedAppRequest
      type: object
      writeOnly: true
      x-order:
        - name
        - description
        - mode
        - repo_url
        - urls
        - cloudflare_pages_config
    ConnectedAppUrlRequest:
      description: URL entry for a Connected App Request
      example:
        is_primary: false
        label: ''
        url: ''
      properties:
        is_primary:
          description: Whether this is the primary URL
          type: boolean
        label:
          description: Display label
          nullable: true
          type: string
        url:
          description: App URL (http/https)
          type: string
      required:
        - url
      title: ConnectedAppUrlRequest
      type: object
      writeOnly: true
      x-order:
        - url
        - is_primary
        - label
    AiAgentListResponse:
      description: Paginated list of AI agents
      properties:
        data:
          description: List of AI agents
          items:
            $ref: '#/components/schemas/AiAgentResponse'
          type: array
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
        - data
        - meta
      title: AiAgentListResponse
      type: object
    DataActivationClientLogListResponse:
      description: Paginated list of data activation client logs
      properties:
        data:
          description: List of data activation client logs
          items:
            $ref: '#/components/schemas/DataActivationClientLogResponse'
          type: array
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
        - data
        - meta
      title: DataActivationClientLogListResponse
      type: object
    ActionStatusUpdaterRequest:
      description: >-
        Action Status Updater — automated polling for delivery status updates.
        Request
      example:
        action_log_config: {}
        cron_expression: ''
        datalake_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        message_config: {}
        name: ''
        sender_tool_ids:
          - 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        updater_body:
          end_time: ''
          log_group_name: ''
          start_time: ''
          updater_body_type: cloud_watch_request
        updater_tool_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        updater_type: cloud_watch
      properties:
        action_log_config:
          description: Template config for action log entries
          nullable: true
          type: object
        cron_expression:
          description: Cron schedule expression (e.g. "*/30 * * * *")
          type: string
        datalake_id:
          description: Datalake ID
          format: uuid
          type: string
        message_config:
          description: Template config for rendering raw events into message updates
          type: object
        name:
          description: Updater name
          type: string
        sender_tool_ids:
          description: IDs of sender tools whose messages this updater monitors
          items:
            format: uuid
            type: string
          nullable: true
          type: array
        updater_body:
          discriminator:
            mapping:
              cloud_watch_request: '#/components/schemas/ActionStatusUpdaterCloudWatchQueryRequest'
              restapi_request: '#/components/schemas/ActionStatusUpdaterRESTCallRequest'
            propertyName: updater_body_type
          oneOf:
            - $ref: '#/components/schemas/ActionStatusUpdaterCloudWatchQueryRequest'
            - $ref: '#/components/schemas/ActionStatusUpdaterRESTCallRequest'
          type: object
          writeOnly: true
        updater_tool_id:
          description: Tool providing auth credentials for polling
          format: uuid
          type: string
        updater_type:
          description: Updater type — determines the updater_body shape
          enum:
            - cloud_watch
            - restapi
          type: string
      title: ActionStatusUpdaterRequest
      type: object
      writeOnly: true
      x-order:
        - name
        - cron_expression
        - updater_type
        - updater_tool_id
        - datalake_id
        - sender_tool_ids
        - message_config
        - action_log_config
        - updater_body
    InvitationListResponse:
      description: Paginated list of invitations
      properties:
        data:
          description: List of invitations
          items:
            $ref: '#/components/schemas/InvitationResponse'
          type: array
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
        - data
        - meta
      title: InvitationListResponse
      type: object
    ToolSNSRequest:
      allOf:
        - $ref: '#/components/schemas/SNSRequest'
        - properties:
            tool_body_type:
              enum:
                - sns
              type: string
          required:
            - tool_body_type
          type: object
      title: ToolSNSRequest
      type: object
    DataActivationClientSQLQueryCallRequest:
      allOf:
        - $ref: '#/components/schemas/SQLQueryCallRequest'
        - properties:
            tool_call_type:
              enum:
                - sql_query
              type: string
          required:
            - tool_call_type
          type: object
      title: DataActivationClientSQLQueryCallRequest
      type: object
    AiAgentResponse:
      description: AI Agent configuration — reusable chat-completion resource
      example:
        data_access: regulated
        datalake: null
        description: ''
        enabled: false
        id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        input_schema: {}
        inserted_at: '2020-04-20T16:20:00Z'
        llm_response_schema: {}
        max_tokens: 0
        model: ''
        name: ''
        prompt_config: {}
        slug: ''
        temperature: 0
        tenant: null
        tool: null
        tool_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        updated_at: '2020-04-20T16:20:00Z'
      properties:
        data_access:
          description: Data access level
          enum:
            - regulated
            - unregulated
          type: string
        datalake:
          $ref: '#/components/schemas/DatalakeResponse'
        description:
          description: Agent description
          nullable: true
          type: string
        enabled:
          description: Whether the agent is enabled
          type: boolean
        id:
          description: AI Agent ID
          format: uuid
          type: string
        input_schema:
          description: >-
            JSON Schema describing the agent's input contract — validated by the
            runner against caller context on every invocation.
          type: object
        inserted_at:
          description: Creation timestamp
          format: date-time
          type: string
        llm_response_schema:
          description: JSON Schema for LLM response format
          nullable: true
          type: object
        max_tokens:
          description: Maximum tokens for LLM response
          type: integer
        model:
          description: LLM model identifier
          type: string
        name:
          description: Agent name
          type: string
        prompt_config:
          description: Prompt template configuration
          nullable: true
          type: object
        slug:
          description: URL-friendly slug
          type: string
        temperature:
          description: Sampling temperature (0.0–2.0)
          format: float
          type: number
        tenant:
          $ref: '#/components/schemas/TenantResponse'
        tool:
          $ref: '#/components/schemas/ToolResponse'
        tool_id:
          description: Tool ID
          format: uuid
          type: string
        updated_at:
          description: Last update timestamp
          format: date-time
          type: string
      readOnly: true
      required:
        - name
        - model
        - tool_id
        - data_access
        - temperature
        - max_tokens
        - input_schema
        - llm_response_schema
        - enabled
        - prompt_config
      title: AiAgentResponse
      type: object
      x-order:
        - id
        - name
        - slug
        - description
        - data_access
        - model
        - temperature
        - max_tokens
        - input_schema
        - llm_response_schema
        - enabled
        - tool_id
        - tenant
        - datalake
        - tool
        - prompt_config
        - inserted_at
        - updated_at
    SignUpRequest:
      description: |-
        Register a new user account. Mirrors the `/auth/register` LiveView form
        submission shape. The created user is **unconfirmed** — caller must
        confirm separately (e.g. via the email confirmation flow, or via
        `PUT /api/v1/admin/users/:id/confirm` for tests) before signing in.

        No authentication is required.
         Request
      example:
        email: ''
        first_name: ''
        last_name: ''
        password: examplee
      properties:
        email:
          description: User email
          format: email
          type: string
        first_name:
          description: First name
          nullable: true
          type: string
        last_name:
          description: Last name
          nullable: true
          type: string
        password:
          description: >-
            Password (8–72 characters; mirrors the `/auth/register` LiveView
            form)
          maxLength: 72
          minLength: 8
          type: string
          writeOnly: true
      required:
        - email
        - password
        - first_name
        - last_name
      title: SignUpRequest
      type: object
      writeOnly: true
      x-order:
        - email
        - password
        - first_name
        - last_name
    CloudWatchQueryResponse:
      description: >-
        CloudWatch log group query descriptor — log group name plus
        Liquid-templated time window. Reusable across any caller that needs
        CloudWatch polling (currently ActionStatusUpdater.updater_body). Title
        is CloudWatchQuery (not CloudWatchRequest) to avoid triple-`Request`
        stacking in the library-generated parent-contextual sibling module names
        (e.g. ActionStatusUpdaterCloudWatchQueryRequest).
      example:
        end_time: ''
        log_group_name: ''
        start_time: ''
      properties:
        end_time:
          description: >-
            Liquid template for the poll window end time, rendered with `{{ now
            }}` in unix milliseconds (e.g., "{{ now }}")
          type: string
        log_group_name:
          description: CloudWatch log group name to poll for delivery events
          type: string
        start_time:
          description: >-
            Liquid template for the poll window start time, rendered with `{{
            now }}` in unix milliseconds (e.g., "{{ now | minutes_ago: 45 }}")
          type: string
      readOnly: true
      required:
        - log_group_name
        - start_time
        - end_time
      title: CloudWatchQueryResponse
      type: object
      x-order:
        - log_group_name
        - start_time
        - end_time
    ManualToolInvocationRESTCallRequest:
      allOf:
        - $ref: '#/components/schemas/RESTCallRequest'
        - properties:
            tool_call_type:
              enum:
                - restapi_request
              type: string
          required:
            - tool_call_type
          type: object
      title: ManualToolInvocationRESTCallRequest
      type: object
    ToolS3Request:
      allOf:
        - $ref: '#/components/schemas/S3Request'
        - properties:
            tool_body_type:
              enum:
                - s3
              type: string
          required:
            - tool_body_type
          type: object
      title: ToolS3Request
      type: object
    SignInRequest:
      description: >-
        Exchange user credentials for a Bearer session token.


        `tenant_slug` is optional — when omitted, returns a tenant-less Bearer
        for

        use on `/api/v1/admin/...` operations and pre-tenant flows like

        `POST /api/v1/tenants` (creating your first tenant). When provided,

        returns a tenant-scoped Bearer with the caller's membership role.


        For M2M authentication, use the `X-API-Key` header directly instead.
         Request
      example:
        email: ''
        expires_in: 60
        password: a
        tenant_slug: ''
      properties:
        email:
          description: User email address
          format: email
          type: string
          writeOnly: true
        expires_in:
          description: >-
            Session duration in seconds. Default: 86400 (24h). Maximum: 2592000
            (30 days).
          maximum: 2592000
          minimum: 60
          nullable: true
          type: integer
          writeOnly: true
        password:
          description: User password
          minLength: 1
          type: string
          writeOnly: true
        tenant_slug:
          description: >-
            Tenant slug to create session for. Omit to mint a tenant-less Bearer
            (admin operations, pre-tenant sign-up flow).
          nullable: true
          type: string
          writeOnly: true
      required:
        - email
        - password
      title: SignInRequest
      type: object
      writeOnly: true
      x-order:
        - email
        - password
        - tenant_slug
        - expires_in
    ToolSFTPResponse:
      allOf:
        - $ref: '#/components/schemas/SFTPResponse'
        - properties:
            tool_body_type:
              enum:
                - sftp
              type: string
          required:
            - tool_body_type
          type: object
      title: ToolSFTPResponse
      type: object
    ManualToolInvocationAWSLambdaCallRequest:
      allOf:
        - $ref: '#/components/schemas/AWSLambdaCallRequest'
        - properties:
            tool_call_type:
              enum:
                - aws_lambda_request
              type: string
          required:
            - tool_call_type
          type: object
      title: ManualToolInvocationAWSLambdaCallRequest
      type: object
    RunManuallyResponse:
      description: >-
        Acknowledgement of an enqueued manual run. The `batch_id` can be used to
        poll per-dataset processing logs (via upcoming runs list/show
        endpoints).
      example:
        batch_id: b3f9c2a1-3c2e-4f5b-a7c8-1d9e2f5a6b7c
      properties:
        batch_id:
          description: Batch ID stamped on every Oban job for this run
          format: uuid
          type: string
      required:
        - batch_id
      title: RunManuallyResponse
      type: object
    BatchLogListResponse:
      description: Paginated list of batch run logs
      properties:
        data:
          description: List of batch run logs
          items:
            $ref: '#/components/schemas/BatchLogResponse'
          type: array
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
        - data
        - meta
      title: BatchLogListResponse
      type: object
    RoleResponse:
      description: Lean role reference — id, name, and description
      example:
        description: ''
        id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        name: ''
      properties:
        description:
          description: Role description
          nullable: true
          type: string
        id:
          description: Role ID
          format: uuid
          readOnly: true
          type: string
        name:
          description: Role name (e.g. tenant_admin, platform_admin)
          type: string
      readOnly: true
      required:
        - id
        - name
      title: RoleResponse
      type: object
      x-order:
        - id
        - name
        - description
