  - description: Platform health and connectivity checks.
    name: Health
  - description: Session authentication — create human sessions and verify credentials.
    name: Auth
  - description: >-
      Platform-admin endpoints — root sign-in, force-confirm users, and other
      operations gated by `User.role == :admin`.
    name: Admin
  - description: Tenant listing — accessible tenants for the authenticated identity.
    name: Tenants
  - description: Datalake CRUD — non-sensitive metadata only.
    name: Datalakes
  - description: AI Agent CRUD — reusable chat-completion configurations.
    name: AI Agents
  - description: Data Source CRUD — third-party system connections.
    name: Data Sources
  - description: Tool CRUD — configurable capabilities for external services.
    name: Tools
  - description: Action Status Updater CRUD — automated delivery status polling.
    name: Action Status Updaters
  - description: Generic Table management — custom dataset table definitions.
    name: Generic Tables
  - description: Search and browse dataset records within a datalake.
    name: Datasets
  - description: Programmatic data ingestion via Data Activation Clients.
    name: Data Activation Clients
  - description: Master Data Management — verify subject identity against master records.
    name: MDM
  - description: Execute workflow actions for dataset records.
    name: Agentic Workflows
  - description: >-
      Connected App management (CRUD) and runtime operations (resolve page,
      message tracking).
    name: Connected Apps
  - description: >-
      CRUD + sandbox execution for Interoperability Contracts — the
      filter/transform/MDM-input mappings used by Data Activation Clients.
