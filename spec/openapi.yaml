    unprocessable_entity:
      content:
        application/json:
          example:
            errors:
              - detail: can't be blank
                source:
                  pointer: /name
                title: Invalid value
              - detail: should be at most 3 character(s)
                source:
                  pointer: /name
                title: Invalid value
          schema:
            $ref: '#/components/schemas/AlveraAPIError'
      description: |
        Validation or pipeline error. Response body conforms to the
        `AlveraAPIError` schema — a JSON:API-style error object with `errors`
        as a non-empty array of `{detail, source.pointer, title}` entries.

        `title` is the error category / machine-readable code:
        `"Invalid value"` for request-body validation, or a pipeline stage
        code (`"transform_failed"`, `"mdm_input_render_failed"`, etc.) for
        `/run` endpoint errors.

        `source.pointer` is an RFC 6901 JSON Pointer: into the request body
        for validation errors (`/name`, `/template_config/body`), or into the
        failing contract field for pipeline errors.
  schemas:
    UserSearchResponse:
      description: |
        User SQL search resource. Created via `POST /datasets/:dataset/user-searches`
        with a `WHERE`-clause body in `search_query`; the platform executes
        `INSERT INTO search_results SELECT … WHERE <body>` to populate
        `search_results` and reports back `status`, `results_count`, and
        `error_message`.

        UserSearch carries no `data_access_mode` of its own — the capability check
        runs at query time via `Platform.RegulatedDatalakeRepo.prepare_query/3`,
        which reads the ambient session and raises 403 when the ceiling is
        insufficient. ExOpenApiUtils derives `UserSearchRequest` (writeable subset)
        and `UserSearchResponse` (full readable shape) from this declaration via
        the readOnly/writeOnly markers on each property.
      example:
        error_message: ''
        generic_table_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        resource_type: ''
        results_count: 0
        search_query: a
        status: new
      properties:
        error_message:
          description: SQL execution error message when status is `error`; null otherwise
          nullable: true
          readOnly: true
          type: string
          x-struct:
          x-validate:
        generic_table_id:
          description: Generic-table identifier. Required when the dataset is a generic table; must be omitted otherwise.
          format: uuid
          nullable: true
          type: string
          x-struct:
          x-validate:
        id:
          description: User search ID
          format: uuid
          readOnly: true
          type: string
          x-struct:
          x-validate:
        resource_type:
          description: Resource type the search runs against (e.g. "patient", "appointment", "generic_table"). On `POST /datasets/:dataset/user-searches` this is taken from the URL path; on the response it echoes that value.
          readOnly: true
          type: string
          x-struct:
          x-validate:
        results_count:
          description: Number of rows the SQL search matched
          nullable: true
          readOnly: true
          type: integer
          x-struct:
          x-validate:
        search_query:
          description: SQL `WHERE`-clause body. The platform wraps it in `INSERT INTO search_results SELECT … WHERE <body>`. Reference the table aliases exposed by the dataset's base decomposed query (see `GET /datasets/:dataset_type/metadata`).
          minLength: 1
          type: string
          x-struct:
          x-validate:
        status:
          description: Search execution status
          enum:
            - new
            - in_progress
            - completed
            - error
          readOnly: true
          type: string
          x-struct:
          x-validate:
      readOnly: true
      required:
        - search_query
      title: UserSearchResponse
      type: object
      x-order:
        - id
        - resource_type
        - search_query
        - status
        - results_count
        - error_message
        - generic_table_id
      x-struct: Elixir.Platform.OpenApiSchema.UserSearchResponse
      x-validate:
