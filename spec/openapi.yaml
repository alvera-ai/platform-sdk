    DataActivationClientLogResponse:
      description: >-
        One log row per `(batch_id, dataset_table)`. A batch fans out into one
        log per dataset table — so a single run (one `batch_id`) produces
        multiple log rows, one per table the DAC writes into. `output_files`
        carries the merged NDJSON URI once `BatchMergeWorker` has finished; use
        `/logs/:id/download` to fetch a presigned URL.
      example:
        batch_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        client_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        dataset_table: ''
        dataset_updated: 0
        id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        input_files:
          - ''
        inserted_at: '2020-04-20T16:20:00Z'
        output_files:
          - null
        rows_ingested: 0
        updated_at: '2020-04-20T16:20:00Z'
      properties:
        batch_id:
          description: Batch identifier stamped on every Oban job for this run
          format: uuid
          type: string
        client_id:
          description: Owning Data Activation Client ID
          format: uuid
          readOnly: true
          type: string
        dataset_table:
          description: Target dataset table for this slice (e.g. patients, observations)
          type: string
        dataset_updated:
          default: 0
          description: Number of existing rows whose checksum changed (trigger-maintained)
          type: integer
        id:
          description: Run log ID
          format: uuid
          readOnly: true
          type: string
        input_files:
          default: []
          description: Source file keys fetched for this slice
          items:
            type: string
          type: array
        inserted_at:
          format: date-time
          readOnly: true
          type: string
        output_files:
          description: >-
            Merged NDJSON archives produced by `BatchMergeWorker`, one entry per
            bucket mode. Empty until the merge completes. Parse `object_key`
            (`s3://bucket/key`) and fetch a presigned URL via the datalake
            download-link endpoint.
          items:
            $ref: '#/components/schemas/DACRawLogFileResponse'
          readOnly: true
          type: array
        rows_ingested:
          default: 0
          description: Total source rows ingested by this slice of the batch
          type: integer
        updated_at:
          format: date-time
          readOnly: true
          type: string
      readOnly: true
      required:
        - batch_id
        - client_id
        - dataset_table
      title: DataActivationClientLogResponse
      type: object
      x-order:
        - id
        - batch_id
        - client_id
        - dataset_table
        - dataset_updated
        - rows_ingested
        - input_files
        - output_files
        - inserted_at
