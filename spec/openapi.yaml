        Executes the workflow for all dataset records matching the SQL WHERE
        clause.

        Creates sampled events and enqueues run_workflow jobs. Returns the batch
        ID

        and enqueued count. A WorkflowRunLog is created to track batch-level

        progress, polled by a daily DynamicCron.


        ## Per-step artifacts (audit trail)


        Each per-row WorkflowExecutionLog (WEL) writes a fixed set of JSON

        artifacts to the datalake's regulated cloud-storage bucket. The path is

        deterministic and convention-driven — there is no separate listing

        endpoint:

            workflows/{workflow_id}/executions/{wel_id}/event.json
            workflows/{workflow_id}/executions/{wel_id}/filter.json
            workflows/{workflow_id}/executions/{wel_id}/enrichment.json
            workflows/{workflow_id}/executions/{wel_id}/error.json   # only on failure

        | File              | Written by stage                       |
        Body                                                               |

        | ----------------- | -------------------------------------- |
        ------------------------------------------------------------------ |

        | `event.json`      | context build                          | full
        WorkflowContext (event_dataset, mdm_output, additional_context)|

        | `filter.json`     | filter eval (both pass and reject)     |
        `{filter_expression, filter_result: bool}`                         |

        | `enrichment.json` | enrichment terminal (success / skip / fail) |
        `{status: "completed" \| "failed" \| "skipped", <agent_slug>: ...}` |

        | `error.json`      | ANY pipeline failure                   | `{stage,
        error_code, ai_agent_slug, error_message, detail}`        |


        `error.json`'s presence IS the failure signal — `WEL.error_message`

        carries only a code-grade summary; the rich URL/HTTP-status/transport

        detail lives ONLY in `error.json["detail"]`. Engineers debugging a

        failed run should download `error.json` for full context.


        ### Fetching an artifact


        Use the standard datalake download-link endpoint

        (`POST
        /api/v1/tenants/{tenant_slug}/datalakes/{datalake_slug}/download-link`)

        with `bucket = <regulated bucket>` and the convention key above.
        Example:

            POST /api/v1/tenants/acme/datalakes/clinical/download-link
            { "bucket": "clinical-regulated", "key": "workflows/<wf_id>/executions/<wel_id>/error.json" }

        The response carries a short-lived signed URL. The regulated bucket is

        exposed on the datalake response as `regulated_cloud_storage.bucket`.
      operationId: PlatformApi.AgenticWorkflowOperationsController.run_workflow
      parameters:
        - description: Tenant slug
