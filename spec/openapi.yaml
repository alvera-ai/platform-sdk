    AlveraAPIError:
      description: >-
        Uniform JSON:API error response for the Alvera API. See module docs for
        pointer format, title/detail semantics, and pipeline error codes.
      example:
        errors:
          - detail: can't be blank
            source:
              pointer: /name
            title: Invalid value
          - detail: should be at most 3 character(s)
            source:
              pointer: /name
            title: Invalid value
          - detail: 'Liquid syntax error: unexpected ''}'' at line 3'
            source:
              pointer: /template_config/body
            title: transform_failed
      properties:
        errors:
          description: >-
            One entry per validation failure. A 422 always has at least one
            error; an empty array is never emitted.
          items:
            properties:
              detail:
                description: >-
                  Human-readable message. Validator `%{var}` placeholders are
                  already interpolated server-side; pipeline errors surface the
                  underlying cause (Liquid parser line, JSON decode position,
                  etc.).
                example: can't be blank
                type: string
              source:
                description: Locates the offending field.
                properties:
                  pointer:
                    description: >-
                      RFC 6901 JSON Pointer. For validation errors it points
                      into the request body (`/name`, `/items`); for `/run`
                      pipeline errors it points into the contract field whose
                      template produced the failure (`/template_config/body`,
                      `/mdm_input_config/body`, `/filter_template`).
                    example: /name
                    type: string
                required:
                  - pointer
                type: object
              title:
                description: >-
                  Short error category / machine-readable code. Validation
                  errors: constant "Invalid value". Pipeline errors: stage code
                  — "transform_failed", "mdm_input_render_failed",
                  "template_body_missing", "filter_evaluation_failed". Clients
                  can pattern-match on this field for programmatic dispatch.
                example: Invalid value
                type: string
            required:
              - detail
              - source
              - title
            type: object
          minItems: 1
          type: array
      required:
        - errors
      title: AlveraAPIError
      type: object
