    UserSearchResponse:
      description: >
        User SQL search resource. Created via `POST
        /datasets/:dataset/user-searches`

        with a `WHERE`-clause body in `search_query`; the platform executes

        `INSERT INTO search_results SELECT … WHERE <body>` to populate

        `search_results` and reports back `status`, `results_count`, and

        `error_message`.


        UserSearch carries no `data_access_mode` of its own — the capability
        check

        runs at query time via `Platform.RegulatedDatalakeRepo.prepare_query/3`,

        which reads the ambient session and raises 403 when the ceiling is

        insufficient. ExOpenApiUtils derives `UserSearchRequest` (writeable
        subset)

        and `UserSearchResponse` (full readable shape) from this declaration via

        the readOnly/writeOnly markers on each property.
      example:
        error_message: ''
        generic_table_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        resource_type: ''
        results_count: 0
        search_query: a
        status: new
      properties:
        error_message:
          description: SQL execution error message when status is `error`; null otherwise
          nullable: true
          readOnly: true
          type: string
        generic_table_id:
          description: >-
            Generic-table identifier. Required when the dataset is a generic
            table; must be omitted otherwise.
          format: uuid
          nullable: true
          type: string
        id:
          description: User search ID
          format: uuid
          readOnly: true
          type: string
        resource_type:
          description: >-
            Resource type the search runs against (e.g. "patient",
            "appointment", "generic_table"). On `POST
            /datasets/:dataset/user-searches` this is taken from the URL path;
            on the response it echoes that value.
          readOnly: true
          type: string
        results_count:
          description: Number of rows the SQL search matched
          nullable: true
          readOnly: true
          type: integer
        search_query:
          description: >-
            SQL `WHERE`-clause body. The platform wraps it in `INSERT INTO
            search_results SELECT … WHERE <body>`. Reference the table aliases
            exposed by the dataset's base decomposed query (see `GET
            /datasets/:dataset_type/metadata`).
          minLength: 1
          type: string
        status:
          description: Search execution status
          enum:
            - new
            - in_progress
            - completed
            - error
          readOnly: true
          type: string
      readOnly: true
      required:
        - search_query
      title: UserSearchResponse
      type: object
      x-order:
        - id
        - resource_type
        - search_query
        - status
        - results_count
        - error_message
        - generic_table_id
  securitySchemes:
    api_key:
      description: 'API key for M2M authentication. Include as: X-API-Key: your_api_key_here'
      in: header
      name: X-API-Key
      type: apiKey
    bearer_token:
      description: >-
        Session Bearer token for human authentication. Obtain via POST
        /api/v1/sessions, then include as: Authorization: Bearer <token>
      scheme: bearer
      type: http
info:
  description: >
    The Alvera Platform API provides programmatic access to datalake management,
    data ingestion, identity verification, and agentic workflow execution.


    Endpoints require `X-API-Key` (M2M) or `Authorization: Bearer` (human
    sessions) for authentication, except Health and session creation.


    For detailed setup and configuration, see the platform how-to guides:

    - [Tenant Management](/guides/howto_manage_tenants.html)

    - [Datalake Management](/guides/howto_manage_datalakes.html)

    - [Data Activation](/guides/howto_manage_data_activation.html)

    - [Workflows](/guides/howto_manage_workflows.html)
  title: Alvera Platform API
  version: '1.0'
openapi: 3.0.0
paths:
  /api/v1/tenants/{tenant_slug}/connected-apps/{slug}/resolve-page:
    post:
      callbacks: {}
      description: >
        Given a connected app slug and a Puid short URL token, resolves the
        token to

        the pre-stored route path and MDM subject ID. The Cloudflare app calls
        this

        endpoint when a customer clicks a short URL, forwarding the original
        client

        headers (user-agent, IP, country) in the request body.


        When the page token is linked to a message (via workflow action
        execution),

        the regulated message details (raw body, channel, status) are included
        in

        the response.


        **Requires X-API-Key authentication.**
      operationId: PlatformApi.ConnectedAppController.resolve_page
      parameters:
        - description: Tenant slug
          in: path
          name: tenant_slug
          required: true
          schema:
            type: string
        - description: Connected App slug
          in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolvePageRequest'
        description: Page resolution request
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolvePageResponse'
          description: Resolved page details
        '401':
          content:
            application/json:
              schema:
                type: object
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                type: object
          description: Not found
        '410':
          content:
            application/json:
              schema:
                type: object
          description: Token expired
        '422':
          content:
            application/json:
              schema:
                type: object
          description: Validation error
      security:
        - api_key: []
