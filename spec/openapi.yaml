        Wraps `Platform.Tenants.create_tenant/3` verbatim — same primitive that
        backs the `/app/tenants/new` LiveView.

        On success returns a regular `SessionResponse` carrying a freshly-minted
        **tenant-scoped Bearer** (`session_token`), the new tenant, and the
        membership role. Callers swap their tenant-less Bearer for this token
        and proceed with tenant-scoped work — no second sign-in round-trip.

