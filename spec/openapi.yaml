  /api/v1/tenants/{tenant_slug}/connected-apps/{slug}/resolve-page:
    post:
      callbacks: {}
      description: |
        Given a connected app slug and a Puid short URL token, resolves the token to
        the pre-stored route path and MDM subject ID. The Cloudflare app calls this
        endpoint when a customer clicks a short URL, forwarding the original client
        headers (user-agent, IP, country) in the request body.

        When the page token is linked to a message (via workflow action execution),
        the regulated message details (raw body, channel, status) are included in
        the response.

        **Requires X-API-Key authentication.**
      operationId: PlatformApi.ConnectedAppController.resolve_page
      parameters:
        - description: Tenant slug
          in: path
          name: tenant_slug
          required: true
          schema:
            type: string
            x-struct:
            x-validate:
        - description: Connected App slug
          in: path
          name: slug
          required: true
          schema:
            type: string
            x-struct:
            x-validate:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolvePageRequest'
        description: Page resolution request
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolvePageResponse'
          description: Resolved page details
        '401':
          content:
            application/json:
              schema:
                type: object
                x-struct:
                x-validate:
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                type: object
                x-struct:
                x-validate:
          description: Not found
        '410':
          content:
            application/json:
              schema:
                type: object
                x-struct:
                x-validate:
          description: Token expired
        '422':
          content:
            application/json:
              schema:
                type: object
                x-struct:
                x-validate:
          description: Validation error
      security:
        - api_key: []
      summary: Resolve a short URL token to a page
      tags:
        - Connected Apps
