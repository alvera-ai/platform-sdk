          description: Action type; must match the tool's intent
          enum:
            - sms
            - email
            - voice
            - data_exchange
          type: string
        action_window_end:
          description: Hour (0–23) when the action's execution window closes
          maximum: 23
          minimum: 0
          nullable: true
          type: integer
        action_window_start:
          description: >-
            Hour (0–23) when the action's execution window opens (failsafe,
            typically SMS)
          maximum: 23
          minimum: 0
          nullable: true
          type: integer
        connected_app_id:
          description: Optional connected app — only valid for :sms and :email action types
          format: uuid
          nullable: true
          type: string
        connected_app_metadata_template:
          description: >-
            Liquid template rendered to JSON at execution time and stored in the
            connected-app page token (optional)
          nullable: true
          type: string
        connected_app_route:
          description: >-
            Route path within the connected app — required when connected_app_id
            is set
          nullable: true
          type: string
        decision_key:
          description: >-
            Unique decision_key within the workflow — maps to a decision-table
            outcome
          type: string
        id:
          description: Action ID
          format: uuid
          readOnly: true
          type: string
        idempotency_template:
          description: >-
            Liquid template producing the idempotency key; receives checksum,
            subject_id, workflow_id, action_id, decision_key
          type: string
        inserted_at:
          format: date-time
          readOnly: true
          type: string
        position:
          default: 0
          description: Display order within the workflow
          type: integer
        runtime_filter:
          description: >-
            Liquid template evaluated at execution time; when falsy, the action
