    InteroperabilityRunResponse:
      description: >-
        Pipeline output for a single row. `stage` indicates the last pipeline
        stage reached; `transformed`/`mdm_input` are populated only when that
        stage executed successfully.
      example:
        filter_result: pass
        mdm_input:
          identifiers:
            - system: mrn
              value: abc-123
        stage: completed
        transformed:
          first_name: Jane
          last_name: Doe
      properties:
        filter_result:
          description: Result of the row-level Liquid filter.
          enum:
            - pass
            - skip
          type: string
        mdm_input:
          additionalProperties: true
          description: >-
            Output of `mdm_input_config` rendering. `null` when filtered or when
            mdm_input_config is null/identity.
          nullable: true
          type: object
        stage:
          description: >-
            `completed` = row passed filter, transform, and mdm_input.
            `filtered` = skipped by filter_template (transform/mdm_input not
            run).
          enum:
            - completed
            - filtered
          type: string
        transformed:
          additionalProperties: true
          description: >-
            Output of `template_config` rendering. `null` when stage ==
            "filtered".
          nullable: true
          type: object
      required:
        - stage
        - filter_result
      title: InteroperabilityRunResponse
      type: object
