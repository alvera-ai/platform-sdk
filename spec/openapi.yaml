  /api/v1/tenants/{tenant_slug}/datalakes/{datalake_slug}/data-activation-clients:
    get:
      callbacks: {}
      description: Returns a paginated list of DACs for the datalake in the path.
      operationId: PlatformApi.DataActivationClientController.index
      parameters:
        - description: Tenant slug
          in: path
          name: tenant_slug
          required: true
          schema:
            type: string
        - description: Datalake slug
          in: path
          name: datalake_slug
          required: true
          schema:
            type: string
        - description: Items per page
          in: query
          name: page_size
          required: false
          schema:
            type: integer
        - description: Page number (1-indexed). Defaults to 1 when omitted.
          in: query
          name: page
          required: false
          schema:
            example: 1
            minimum: 1
            type: integer
        - description: >-
            Items per page (1-100). Defaults to the resource's Flop default when
            omitted.
          in: query
          name: page_size
          required: false
          schema:
            example: 20
            maximum: 100
            minimum: 1
            type: integer
        - description: >-
            Fields to sort by, in order of precedence. Must appear in the
            resource schema's Flop `sortable:` list — unknown fields return 422.
          in: query
          name: order_by
          required: false
          schema:
            example:
              - inserted_at
            items:
              type: string
            type: array
        - description: >-
            Sort direction(s), pair-wise with `order_by`. `asc` or `desc`.
            Defaults to `asc` per unpaired `order_by` entry.
          in: query
          name: order_directions
          required: false
          schema:
            example:
              - desc
            items:
              enum:
                - asc
                - desc
              type: string
            type: array
        - description: >-
            Flop-native filter array. URL shape:
            `?filters[0][field]=status&filters[0][op]=equal&filters[0][value]=pending`.
            Unknown fields or operators return 422 via Flop validation at the
            context layer.
          explode: true
          in: query
          name: filters
          required: false
          schema:
            example:
              - field: status
                op: '=='
                value: pending
            items:
              properties:
                field:
                  description: >-
                    Filterable field name (must be in the resource's
                    `filterable:`)
                  type: string
                op:
                  description: Comparison operator. Defaults to `==` when omitted.
                  enum:
                    - '=='
                    - '!='
                    - <
                    - <=
                    - '>'
                    - '>='
                    - empty
                    - not_empty
                    - like
                    - ilike
                    - like_and
                    - like_or
                    - ilike_and
                    - ilike_or
                    - in
                    - not_in
                    - contains
                    - not_contains
                  type: string
                value:
                  description: Filter value — shape depends on `field` and `op`.
              required:
                - field
                - value
              type: object
            type: array
          style: deepObject
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataActivationClientListResponse'
          description: DAC list
        '401':
          $ref: '#/components/responses/unauthorised'
        '404':
          $ref: '#/components/responses/not_found'
