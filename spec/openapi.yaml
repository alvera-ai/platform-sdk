  /api/v1/tenants/{tenant_slug}/datalakes/{datalake_slug}/data-activation-clients/{slug}/ingest:
    post:
      callbacks: {}
      description: >
        Ingest a single JSON record for processing through the data activation

        pipeline. Returns immediately with `{batch_id, key, jobs_count}`;
        per-row

        work runs asynchronously on the data-activation Oban queue.


        ## Per-batch artifacts (audit trail)


        The DAC pipeline does NOT use the `<step>.json` convention that
        workflows

        do — its byproducts are NDJSON archives, surfaced on the

        `DataActivationLog` row that the batch produces:


        | Field           | Bucket       |
        Body                                                                                    
        |

        | --------------- | ------------ |
        ----------------------------------------------------------------------------------------
        |

        | `key` (response)| regulated    | the raw JSON payload uploaded by THIS
        request                                            |

        | `input_files`   | regulated    | source artifacts consumed by the
        batch (one per ingest call merged into the batch)       |

        | `output_files`  | mixed        | merged NDJSON archives, one
        `{object_key, mode}` per bucket (`regulated` + `unregulated`)|


        ### Fetching diagnostic artifacts


        Use the same datalake download-link endpoint as workflow artifacts

        (`POST
        /api/v1/tenants/{tenant_slug}/datalakes/{datalake_slug}/download-link`):

            # raw payload that this ingest call uploaded
            { "bucket": "<regulated>", "key": "<response.key>" }

            # per-bucket merged archive (after batch completes)
            { "bucket": "<regulated|unregulated>", "key": "<output_files[i].object_key>" }

        `output_files[i].mode` tells you which bucket each archive lives in

        (`regulated` for raw attrs, `unregulated` for tokenized). The regulated
        /

        unregulated bucket names are exposed on the datalake response as

        `regulated_cloud_storage.bucket` / `unregulated_cloud_storage.bucket`.


        ### Failure surfacing


        On a `{:error, _}` ingest response the platform returns `422` with an

        `error` string. For pipeline failures (per-row Oban job exceptions),

        the DataActivationLog row's `rows_ingested` will be lower than the

        submitted count; per-row diagnostics live in the Oban job table

        (`oban_jobs.errors`) keyed by `batch_id`. There is no `error.json`

        artifact on the DAC path — that convention is workflow-only.
      operationId: PlatformApi.DataActivationClientController.ingest
      parameters:
        - description: Tenant slug
          in: path
          name: tenant_slug
          required: true
          schema:
            type: string
        - description: Datalake slug
          in: path
          name: datalake_slug
          required: true
          schema:
            type: string
        - description: Data Activation Client slug
          in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
        description: JSON payload
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
          description: Ingest response
        '401':
          $ref: '#/components/responses/unauthorised'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/unprocessable_entity'
      security:
        - api_key: []
      summary: Ingest JSON data
      tags:
        - Data Activation Clients
