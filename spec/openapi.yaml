      description: >-
        Context dataset for a workflow — declares which records the context
        builder should load (and under what filter) before the enrichment and
        decision stages.
      example:
        dataset_type: ''
        generic_table_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        inserted_at: '2020-04-20T16:20:00Z'
        limit: 1
        position: 0
        updated_at: '2020-04-20T16:20:00Z'
        where_clause: ''
        workflow_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
      properties:
        dataset_type:
          description: >-
            Dataset type — either a standard industry resource (e.g. "patient",
            "appointment") or "generic_table" to reference a custom table
          type: string
        generic_table_id:
          description: Required when `dataset_type == "generic_table"`
          format: uuid
          nullable: true
          type: string
        id:
          description: Context dataset ID
          format: uuid
          readOnly: true
          type: string
        inserted_at:
          format: date-time
          readOnly: true
          type: string
        limit:
          description: Max records to load for this context dataset
          minimum: 1
          nullable: true
          type: integer
        position:
          default: 0
          description: Ordering within the context-builder pipeline
          type: integer
        updated_at:
          format: date-time
          readOnly: true
          type: string
        where_clause:
          description: >-
            Liquid-templated SQL WHERE clause for filtering records at runtime.
            The context builder appends the MDM subject FK automatically.
          nullable: true
          type: string
        workflow_id:
          description: Parent workflow id
          format: uuid
          readOnly: true
          type: string
