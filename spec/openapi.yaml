            name: John Doe
            status: active
        meta:
          flop:
            page: 1
            page_size: 20
            total_count: 1000
            total_pages: 50
          sql:
            page: 1
            page_size: 1000
            total_count: 42000
            total_pages: 42
        user_search:
          error_message:
          generic_table_id:
          id: 018f1234-5678-7abc-def0-123456789abc
          resource_type: patient
          results_count: 42000
