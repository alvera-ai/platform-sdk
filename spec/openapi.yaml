    ActionRequest:
      description: >-
        Workflow action — executes when the decision table routes to this
        `decision_key`. Polymorphic `tool_call` payload is variant-specific via
        `tool_call_type` discriminator. Request
      example:
        action_type: sms
        action_window_end: 0
        action_window_start: 0
        connected_app_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        connected_app_metadata_template: ''
        connected_app_route: ''
        decision_key: ''
        idempotency_template: ''
        position: 0
        runtime_filter: ''
        tool_call:
          body: null
          sms_type: transactional
          to: null
          tool_call_type: sms_request
        tool_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        trigger_template: ''
      properties:
        action_type:
          description: Action type; must match the tool's intent
          enum:
            - sms
            - email
            - voice
            - data_exchange
          type: string
        action_window_end:
          description: Hour (0–23) when the action's execution window closes
          maximum: 23
          minimum: 0
          nullable: true
          type: integer
        action_window_start:
          description: >-
            Hour (0–23) when the action's execution window opens (failsafe,
            typically SMS)
          maximum: 23
          minimum: 0
          nullable: true
          type: integer
        connected_app_id:
          description: Optional connected app — only valid for :sms and :email action types
          format: uuid
          nullable: true
          type: string
        connected_app_metadata_template:
          description: >-
            Liquid template rendered to JSON at execution time and stored in the
            connected-app page token (optional)
          nullable: true
          type: string
        connected_app_route:
          description: >-
            Route path within the connected app — required when connected_app_id
            is set
          nullable: true
          type: string
        decision_key:
          description: >-
            Unique decision_key within the workflow — maps to a decision-table
            outcome
          type: string
        idempotency_template:
          description: >-
            Liquid template producing the idempotency key; receives checksum,
            subject_id, workflow_id, action_id, decision_key
          type: string
        position:
          default: 0
          description: Display order within the workflow
          type: integer
        runtime_filter:
          description: >-
            Liquid template evaluated at execution time; when falsy, the action
            is skipped
          nullable: true
          type: string
        tool_call:
          discriminator:
            mapping:
              aws_lambda_request: '#/components/schemas/ActionAWSLambdaCallRequest'
              email_request: '#/components/schemas/ActionEmailCallRequest'
              manual_upload: '#/components/schemas/ActionManualUploadCallRequest'
              microsoft_share_point_excel_request: '#/components/schemas/ActionSharePointExcelCallRequest'
              restapi_request: '#/components/schemas/ActionRESTCallRequest'
              sftp_request: '#/components/schemas/ActionSFTPCallRequest'
              sms_request: '#/components/schemas/ActionSMSCallRequest'
              sql_query: '#/components/schemas/ActionSQLQueryCallRequest'
            propertyName: tool_call_type
          oneOf:
            - $ref: '#/components/schemas/ActionSMSCallRequest'
            - $ref: '#/components/schemas/ActionEmailCallRequest'
            - $ref: '#/components/schemas/ActionSQLQueryCallRequest'
            - $ref: '#/components/schemas/ActionRESTCallRequest'
            - $ref: '#/components/schemas/ActionSFTPCallRequest'
            - $ref: '#/components/schemas/ActionSharePointExcelCallRequest'
            - $ref: '#/components/schemas/ActionAWSLambdaCallRequest'
            - $ref: '#/components/schemas/ActionManualUploadCallRequest'
          type: object
          writeOnly: true
        tool_id:
          description: Tool that executes this action
          format: uuid
          type: string
        trigger_template:
          description: Liquid template that determines when this action executes
          type: string
      required:
        - decision_key
        - action_type
        - tool_id
        - trigger_template
        - idempotency_template
        - tool_call
      title: ActionRequest
      type: object
      writeOnly: true
      x-order:
        - decision_key
        - action_type
        - tool_id
        - connected_app_id
        - connected_app_route
        - position
        - trigger_template
        - idempotency_template
        - runtime_filter
        - connected_app_metadata_template
        - action_window_start
        - action_window_end
        - tool_call
