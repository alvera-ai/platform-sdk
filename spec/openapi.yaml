          description: Owning data source ID
          format: uuid
          type: string
        datalake_id:
          description: Owning datalake ID (matches :datalake_slug path segment)
          format: uuid
          readOnly: true
          type: string
        description:
          description: DAC description
          nullable: true
          type: string
        downstream_connection_ids:
          default: []
          description: IDs of downstream DACs triggered after this one completes
          items:
            format: uuid
            type: string
          type: array
        id:
          description: DAC ID
          format: uuid
          readOnly: true
          type: string
        inserted_at:
          description: Creation timestamp
          format: date-time
          readOnly: true
          type: string
        interoperability_contract_ids:
          default: []
          description: IDs of interoperability contracts used to transform each fetched row
          items:
            format: uuid
            type: string
          type: array
        is_default:
          description: True for platform-created default DACs. Cannot be deleted.
          readOnly: true
          type: boolean
        loop_over:
          default: []
          description: Which context dimensions the DAC loops over per invocation
          items:
            enum:
              - services
              - locations
              - providers
            type: string
          type: array
        name:
          description: DAC name
          type: string
        row_filter:
          description: >-
            Optional row-level Liquid filter. Rows for which it renders 'true'
            are skipped.
          nullable: true
          type: string
        slug:
          description: URL-friendly slug (derived from name on insert; immutable)
          readOnly: true
          type: string
        tool_call:
          discriminator:
            mapping:
              aws_lambda_request: '#/components/schemas/DataActivationClientAWSLambdaCallResponse'
              manual_upload: >-
                #/components/schemas/DataActivationClientManualUploadCallResponse
              microsoft_share_point_excel_request: >-
                #/components/schemas/DataActivationClientSharePointExcelCallResponse
              restapi_request: '#/components/schemas/DataActivationClientRESTCallResponse'
              s3_request: '#/components/schemas/DataActivationClientS3CallResponse'
              sftp_request: '#/components/schemas/DataActivationClientSFTPCallResponse'
              sql_query: '#/components/schemas/DataActivationClientSQLQueryCallResponse'
            propertyName: tool_call_type
          oneOf:
            - $ref: '#/components/schemas/DataActivationClientRESTCallResponse'
            - $ref: '#/components/schemas/DataActivationClientSQLQueryCallResponse'
            - $ref: '#/components/schemas/DataActivationClientSFTPCallResponse'
            - $ref: >-
                #/components/schemas/DataActivationClientSharePointExcelCallResponse
            - $ref: '#/components/schemas/DataActivationClientAWSLambdaCallResponse'
            - $ref: >-
                #/components/schemas/DataActivationClientManualUploadCallResponse
            - $ref: '#/components/schemas/DataActivationClientS3CallResponse'
          readOnly: true
          type: object
        tool_id:
          description: Owning tool ID
          format: uuid
          type: string
        updated_at:
          description: Last update timestamp
          format: date-time
          readOnly: true
          type: string
