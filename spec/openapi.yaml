        token. Idempotent — confirming an already-confirmed user is a 200 no-op
        that returns the existing `confirmed_at` timestamp.

        Wraps `Accounts.confirm_user!/1` verbatim — exactly the primitive that
        backs the dev/admin email-confirm path in the LiveView UI. **Zero new
        business logic.**

        Powerful primitive: bypasses the regular email-confirmation flow. Every
        successful call is structured-logged with `caller_user_id` and
        `target_user_id` for forensic trail.

        **Requires platform-admin authentication** (`User.role == :admin`).
      operationId: PlatformApi.AdminController.confirm_user
      parameters:
        - description: Target user ID
