    DataActivationClientRequest:
      description: >-
        Data Activation Client — binds a (datalake, data_source, tool) triple
        with a polymorphic `tool_call` config describing how to fetch data from
        the external system, plus optional cron schedule, row-level filter,
        downstream triggers, and interop contracts for row-level transformation.
        Request
      example:
        cron_expressions:
          - ''
        data_source_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        description: ''
        downstream_connection_ids:
          - 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        filter_config: null
        interoperability_contract_ids:
          - 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        loop_over:
          - services
        name: ''
        row_filter: ''
        tool_call:
          body: null
          method: head
          pagination_context_template: null
          params: null
          path: null
          tool_call_type: restapi_request
        tool_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
      properties:
        cron_expressions:
          default: []
          description: >-
            Cron expressions (Crontab syntax, array). Examples: ["0 */6 * * *"]
            for every 6 hours. Omit for on-demand clients.
          items:
            type: string
          type: array
        data_source_id:
          description: Owning data source ID
          format: uuid
          type: string
        description:
          description: DAC description
          nullable: true
          type: string
        downstream_connection_ids:
          default: []
          description: IDs of downstream DACs triggered after this one completes
          items:
            format: uuid
            type: string
          type: array
        filter_config:
          $ref: '#/components/schemas/TemplateConfigRequest'
        interoperability_contract_ids:
          default: []
          description: IDs of interoperability contracts used to transform each fetched row
          items:
            format: uuid
            type: string
          type: array
        loop_over:
          default: []
          description: Which context dimensions the DAC loops over per invocation
          items:
            enum:
              - services
              - locations
              - providers
            type: string
          type: array
        name:
          description: DAC name
          type: string
        row_filter:
          description: >-
            Optional row-level Liquid filter. Rows for which it renders 'true'
            are skipped.
          nullable: true
          type: string
        tool_call:
          discriminator:
            mapping:
              aws_lambda_request: '#/components/schemas/DataActivationClientAWSLambdaCallRequest'
              manual_upload: '#/components/schemas/DataActivationClientManualUploadCallRequest'
              microsoft_share_point_excel_request: >-
                #/components/schemas/DataActivationClientSharePointExcelCallRequest
              restapi_request: '#/components/schemas/DataActivationClientRESTCallRequest'
              s3_request: '#/components/schemas/DataActivationClientS3CallRequest'
              sftp_request: '#/components/schemas/DataActivationClientSFTPCallRequest'
              sql_query: '#/components/schemas/DataActivationClientSQLQueryCallRequest'
            propertyName: tool_call_type
          oneOf:
            - $ref: '#/components/schemas/DataActivationClientRESTCallRequest'
            - $ref: '#/components/schemas/DataActivationClientSQLQueryCallRequest'
            - $ref: '#/components/schemas/DataActivationClientSFTPCallRequest'
            - $ref: >-
                #/components/schemas/DataActivationClientSharePointExcelCallRequest
            - $ref: '#/components/schemas/DataActivationClientAWSLambdaCallRequest'
            - $ref: '#/components/schemas/DataActivationClientManualUploadCallRequest'
            - $ref: '#/components/schemas/DataActivationClientS3CallRequest'
          type: object
          writeOnly: true
        tool_id:
          description: Owning tool ID
          format: uuid
          type: string
      required:
        - name
        - tool_id
        - data_source_id
        - tool_call
      title: DataActivationClientRequest
      type: object
      writeOnly: true
      x-order:
        - name
        - description
        - cron_expressions
        - loop_over
        - row_filter
        - tool_id
        - data_source_id
        - downstream_connection_ids
        - interoperability_contract_ids
        - tool_call
        - filter_config
