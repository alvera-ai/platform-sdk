  /api/v1/sessions:
    delete:
      callbacks: {}
      description: |
        Revokes the current Bearer session — deactivates the session and deletes
        the linked UserToken. The Bearer token becomes immediately invalid.

        Only works with `Authorization: Bearer <session_token>` (not X-API-Key).

        **Requires Bearer authentication.**
      operationId: PlatformApi.SessionController.delete
      parameters: []
      responses:
        '204':
          content:
            application/json: {}
          description: Session revoked
        '401':
          content:
            application/json:
              schema:
                type: object
          description: Invalid or missing Bearer token
        '422':
          content:
            application/json:
              schema:
                type: object
          description: Cannot revoke non-Bearer session
      security:
        - bearer_token: []
      summary: Revoke current session
      tags:
        - Auth
    post:
      callbacks: {}
      description: >
        Exchange user credentials for a Bearer session token.


        Send `{email, password}` (with optional `tenant_slug`) to authenticate a

        human user and receive a session token. Use the returned `session_token`

        as `Authorization: Bearer <session_token>` on subsequent API requests.


        When `tenant_slug` is **omitted**, returns a tenant-less Bearer for

        pre-tenant flows: admin operations under `/api/v1/admin/...` and
        creating

        your first tenant via `POST /api/v1/tenants`. Tenant-scoped routes will

        reject such tokens with 403.


        When `tenant_slug` is **provided**, returns a tenant-scoped Bearer with

        the caller's membership role (or 401 if the user has no membership in

        that tenant).


        Optionally specify `expires_in` (seconds) to control session duration.

        Default: 86400 (24 hours). Maximum: 2592000 (30 days).


        For M2M (server-to-server) authentication, use `X-API-Key` header
        directly

        on each request instead — no session exchange needed.


        **No authentication required** — this endpoint authenticates the caller.
      operationId: PlatformApi.SessionController.create
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
        description: User credentials
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
          description: Session created
        '401':
          content:
            application/json:
              schema:
                type: object
          description: Invalid credentials
        '422':
          content:
            application/json:
              schema:
                type: object
          description: Missing required fields
      summary: Create a session (human auth)
      tags:
        - Auth
