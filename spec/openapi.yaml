                op:
                  description: Comparison operator. Defaults to `==` when omitted.
                  enum:
                    - '=='
                    - '!='
                    - <
                    - <=
                    - '>'
                    - '>='
                    - empty
                    - not_empty
                    - like
                    - ilike
                    - like_and
                    - like_or
                    - ilike_and
                    - ilike_or
                    - in
                    - not_in
                    - contains
                    - not_contains
                  type: string
                value:
                  description: Filter value — shape depends on `field` and `op`.
              required:
                - field
                - value
              type: object
            type: array
          style: deepObject
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatalakeResponse'
          description: Datalake
        '401':
          $ref: '#/components/responses/unauthorised'
        '404':
          $ref: '#/components/responses/not_found'
      security:
        - api_key: []
      summary: Get a datalake
      tags:
        - Datalakes
  /api/v1/tenants/{tenant_slug}/datalakes/{datalake_slug}/download-link:
    post:
      callbacks: {}
      description: >-
        Returns a presigned GET URL for an object stored in one of the
        datalake's cloud storage buckets (regulated or unregulated). Typical
        use: read a `DACRawLogFile.object_key` (`s3://bucket/key`) off a
        data-activation log row, split it into `bucket` and `key`, then POST
        here to obtain a short-lived download URL.
      operationId: PlatformApi.DatalakeController.create_download_link
      parameters:
        - description: Tenant slug
          in: path
          name: tenant_slug
          required: true
          schema:
            type: string
        - description: Datalake slug
          in: path
          name: datalake_slug
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadLinkRequest'
        description: Download link request
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadUrlResponse'
          description: Presigned download URL
        '401':
          $ref: '#/components/responses/unauthorised'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/unprocessable_entity'
      security:
        - api_key: []
      summary: Create datalake download link
      tags:
        - Datalakes
  /api/v1/tenants/{tenant_slug}/agentic-workflows/{workflow_slug}/workflow-logs/{id}/download:
    get:
      callbacks: {}
      description: >-
        Returns a presigned URL for downloading the execution context JSON from
        R2.
      operationId: PlatformApi.AgenticWorkflowOperationsController.workflow_log_download
      parameters:
        - description: Tenant slug
          in: path
          name: tenant_slug
          required: true
          schema:
            type: string
        - description: Workflow slug
          in: path
          name: workflow_slug
          required: true
          schema:
            type: string
        - description: Execution log ID
          in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  url:
                    format: uri
                    type: string
                type: object
          description: Presigned download URL
        '401':
          $ref: '#/components/responses/unauthorised'
        '404':
          $ref: '#/components/responses/not_found'
      security:
        - api_key: []
      summary: Download execution context
      tags:
        - Agentic Workflows
  /api/v1/sessions/verify:
    get:
      callbacks: {}
      description: |
        Returns the current session's tenant, role, and identity information.

        Works with both authentication methods:
        - `X-API-Key` header (M2M)
        - `Authorization: Bearer <session_token>` (human sessions)

        Use this as a "who am I" endpoint to confirm credentials are valid and
        inspect the resolved tenant, role, and identity.

        **Requires authentication** (X-API-Key or Bearer token).
      operationId: PlatformApi.SessionController.verify
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
          description: Session details
        '401':
          content:
            application/json:
              schema:
                type: object
          description: Invalid or missing credentials
      security:
        - api_key: []
        - bearer_token: []
      summary: Verify current session
      tags:
        - Auth
  /api/v1/tenants/{tenant_slug}/datalakes/{datalake_slug}/migrate:
    post:
      callbacks: {}
      description: |
        Enqueues a `DatalakeMigrationWorker` Oban job that brings the datalake's
        per-tenant database to the current schema version. Required after
        `POST /datalakes`, which only persists the metadata row — it does NOT
        run migrations against the per-tenant DB. Without this step, every
        downstream resource that touches per-datalake tables
        (`data_activation_logs`, MDM tables, dataset tables) will fail with
        `relation … does not exist`.

        Asynchronous: returns 202 Accepted as soon as the job is enqueued.
        Callers poll `GET /datalakes/:id` and watch for `status: :ready`.
        Idempotent at the job level — re-enqueueing on a migrated datalake
        is a no-op once the worker completes.

        The LiveView "Migrate Datalake" button calls the same migrator
        synchronously inside the LiveView process.

        Requires a tenant-scoped Bearer with membership role `admin`.
      operationId: PlatformApi.DatalakeController.migrate
      parameters:
        - description: Tenant slug
          in: path
          name: tenant_slug
          required: true
          schema:
            type: string
        - description: Datalake slug
          in: path
          name: datalake_slug
          required: true
          schema:
            type: string
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatalakeMigrateResponse'
          description: Migration job enqueued
        '401':
          $ref: '#/components/responses/unauthorised'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/unprocessable_entity'
      security:
        - api_key: []
      summary: Enqueue datalake migrations
      tags:
        - Datalakes
  /api/v1/tenants/{tenant_slug}/datalakes/{datalake_slug}/data-activation-clients/{slug}:
    delete:
      callbacks: {}
      description: >-
        Deletes a DAC. Returns 422 if the DAC is a platform default
        (is_default=true). Returns 409 if referenced by other resources.
      operationId: PlatformApi.DataActivationClientController.delete
      parameters:
        - description: Tenant slug
          in: path
          name: tenant_slug
          required: true
          schema:
            type: string
        - description: Datalake slug
          in: path
          name: datalake_slug
          required: true
          schema:
            type: string
        - description: DAC slug
          in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '204':
          $ref: '#/components/responses/no_content'
        '401':
          $ref: '#/components/responses/unauthorised'
        '404':
          $ref: '#/components/responses/not_found'
        '409':
          content:
            application/json:
              schema:
                properties:
                  errors:
                    type: object
                type: object
          description: DAC is referenced by another resource
        '422':
          $ref: '#/components/responses/unprocessable_entity'
      security:
        - api_key: []
      summary: Delete a data activation client
      tags:
        - Data Activation Clients
    get:
      callbacks: {}
      description: Returns a single DAC by datalake-scoped slug.
      operationId: PlatformApi.DataActivationClientController.show
      parameters:
        - description: Tenant slug
          in: path
          name: tenant_slug
          required: true
          schema:
            type: string
        - description: Datalake slug
          in: path
          name: datalake_slug
          required: true
          schema:
            type: string
        - description: DAC slug
          in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataActivationClientResponse'
          description: DAC
        '401':
          $ref: '#/components/responses/unauthorised'
        '404':
          $ref: '#/components/responses/not_found'
      security:
        - api_key: []
      summary: Get a data activation client
      tags:
        - Data Activation Clients
    put:
      callbacks: {}
      description: >-
        Replaces a DAC with the full resource body. PUT semantics — all required
        fields must be present. `slug` is immutable.
      operationId: PlatformApi.DataActivationClientController.update
      parameters:
        - description: Tenant slug
          in: path
          name: tenant_slug
          required: true
          schema:
            type: string
        - description: Datalake slug
          in: path
          name: datalake_slug
          required: true
          schema:
            type: string
        - description: DAC slug
          in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataActivationClientRequest'
        description: Full DAC resource (all required fields must be present)
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataActivationClientResponse'
          description: DAC updated
        '401':
          $ref: '#/components/responses/unauthorised'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/unprocessable_entity'
      security:
        - api_key: []
      summary: Replace a data activation client
      tags:
        - Data Activation Clients
  /api/v1/tenants/{tenant_slug}/tools:
    get:
      callbacks: {}
      description: Returns a paginated list of tools for the authenticated tenant.
      operationId: PlatformApi.ToolController.index
      parameters:
        - description: Tenant slug
          in: path
          name: tenant_slug
          required: true
          schema:
            type: string
        - description: Page number (1-indexed). Defaults to 1 when omitted.
          in: query
          name: page
          required: false
          schema:
            example: 1
            minimum: 1
            type: integer
        - description: >-
            Items per page (1-100). Defaults to the resource's Flop default when
            omitted.
          in: query
          name: page_size
          required: false
          schema:
            example: 20
            maximum: 100
            minimum: 1
            type: integer
        - description: >-
            Fields to sort by, in order of precedence. Must appear in the
            resource schema's Flop `sortable:` list — unknown fields return 422.
          in: query
          name: order_by
          required: false
          schema:
            example:
              - inserted_at
            items:
              type: string
            type: array
        - description: >-
            Sort direction(s), pair-wise with `order_by`. `asc` or `desc`.
            Defaults to `asc` per unpaired `order_by` entry.
          in: query
          name: order_directions
          required: false
          schema:
            example:
              - desc
            items:
              enum:
                - asc
                - desc
              type: string
            type: array
        - description: >-
            Flop-native filter array. URL shape:
            `?filters[0][field]=status&filters[0][op]=equal&filters[0][value]=pending`.
            Unknown fields or operators return 422 via Flop validation at the
            context layer.
          explode: true
          in: query
          name: filters
          required: false
          schema:
            example:
              - field: status
                op: '=='
                value: pending
            items:
              properties:
                field:
                  description: >-
                    Filterable field name (must be in the resource's
                    `filterable:`)
                  type: string
                op:
                  description: Comparison operator. Defaults to `==` when omitted.
                  enum:
                    - '=='
                    - '!='
                    - <
                    - <=
                    - '>'
                    - '>='
                    - empty
                    - not_empty
                    - like
                    - ilike
                    - like_and
                    - like_or
                    - ilike_and
                    - ilike_or
                    - in
                    - not_in
                    - contains
                    - not_contains
                  type: string
                value:
                  description: Filter value — shape depends on `field` and `op`.
              required:
                - field
                - value
              type: object
            type: array
          style: deepObject
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolListResponse'
          description: Tool list
        '401':
          $ref: '#/components/responses/unauthorised'
        '404':
          $ref: '#/components/responses/not_found'
      security:
        - api_key: []
      summary: List tools
      tags:
        - Tools
    post:
      callbacks: {}
      description: Creates a new tool for the authenticated tenant.
      operationId: PlatformApi.ToolController.create
      parameters:
        - description: Tenant slug
          in: path
          name: tenant_slug
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolRequest'
        description: Full Tool resource (PUT semantics — all fields required)
        required: false
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
          description: Tool created
        '401':
          $ref: '#/components/responses/unauthorised'
        '422':
          $ref: '#/components/responses/unprocessable_entity'
      security:
        - api_key: []
      summary: Create a tool
      tags:
        - Tools
security: []
