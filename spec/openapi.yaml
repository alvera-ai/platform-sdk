    InteroperabilityContractResponse:
      description: >-
        Declarative execution spec binding a `(datalake, resource_type)` pair to
        the ingestion pipeline: filter → transform → mdm_input → resolve →
        upsert.
      example:
        datalake_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        description: ''
        filter_template: ''
        generic_table_id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        id: 02ef9c5f-29e6-48fc-9ec3-7ed57ed351f6
        inserted_at: '2020-04-20T16:20:00Z'
        name: ''
        resource_type: ''
        slug: ''
        type: system
        updated_at: '2020-04-20T16:20:00Z'
      properties:
        datalake_id:
          description: >-
            Owning datalake ID (matches `:datalake_slug` path segment).
            Server-set on create; request bodies should omit this — it is taken
            from the path.
          format: uuid
          readOnly: true
          type: string
        description:
          description: Optional description
          nullable: true
          type: string
        filter_template:
          description: >-
            Liquid filter body. Renders to "true" to skip the row at ingest
            time; nil or empty = no filter.
          nullable: true
          type: string
        generic_table_id:
          description: Generic table ID (required when resource_type == "generic_table")
          format: uuid
          nullable: true
          type: string
        id:
          description: Contract ID
          format: uuid
          type: string
        inserted_at:
          description: Creation timestamp
          format: date-time
          type: string
        name:
          description: Human-readable contract name
          type: string
        resource_type:
          description: >-
            Dataset this contract targets (e.g. "patient", "observation",
            "generic_table")
          type: string
        slug:
          description: URL-friendly slug (derived from name on insert; immutable)
          type: string
        type:
          description: Template type (synced from template_config.type)
          enum:
            - system
            - custom
            - identity
            - 'null'
          type: string
        updated_at:
          description: Last update timestamp
          format: date-time
          type: string
      readOnly: true
      required:
        - name
        - resource_type
      title: InteroperabilityContractResponse
      type: object
      x-order:
