          $ref: '#/components/responses/unauthorised'
        '403':
          $ref: '#/components/responses/forbidden'
        '422':
          $ref: '#/components/responses/unprocessable_entity'
      security:
        - api_key: []
        - bearer_token: []
      summary: Create a tenant
      tags:
        - Tenants
