      security:
        - api_key: []
      summary: Create and execute a SQL search for a dataset
      tags:
        - Datasets
  /api/v1/datasets/{dataset}/search:
    get:
      callbacks: {}
      description: |
        Two-tier pagination at two layers:

        * **Outer** — `outer_pagination[page]` / `outer_pagination[page_size]`
          (defaults `1` / `1000`, max `1000`) pages cached IDs from
          `search_results`. The cap is dictated by Postgres' `WHERE id IN (^ids)`
          plan — past ~1k parameters the planner regresses.
        * **Inner** — `inner_search[page]`, `inner_search[page_size]` (defaults
          `1` / `20`), `inner_search[order_direction]` (sort on the schema's
          `:global_search` compound), `inner_search[global_search]` (single
          ILIKE-OR text-search knob).

        Response carries both metas under `meta.sql` and `meta.flop`. A caller
        that only drives the inner page sees `meta.sql.has_next_page=true` when
        the SQL search isn't exhausted; advancing `outer_pagination[page]`
        fetches the next chunk.
      operationId: PlatformApi.DatasetController.search
      parameters:
        - description: Dataset type (e.g. patient, member, generic_table)
          in: path
          name: dataset
          required: true
          schema:
            type: string
        - description: UserSearch ID. Omit to search the resource without a SQL search.
          in: query
          name: user_search_id
          required: false
          schema:
            format: uuid
            type: string
        - description: Optional datalake ID (defaults to first datalake for the org)
          in: query
          name: datalake_id
          required: false
          schema:
            format: uuid
            type: string
        - description: >-
            Optional override for the data access mode used by this read.
            Defaults to the session's `data_access_mode`. The session's
            capability ceiling still applies — escalating beyond it returns 403.
          in: query
          name: data_access_mode
          required: false
          schema:
            enum:
              - regulated
              - unregulated
            type: string
        - description: Outer page over the cached search_results chunk.
          explode: true
          in: query
          name: outer_pagination
          required: false
          schema:
            $ref: '#/components/schemas/OuterPagination'
          style: deepObject
        - description: Inner search input over the resource — page, sort, global_search.
          explode: true
          in: query
          name: inner_search
          required: false
          schema:
            $ref: '#/components/schemas/InnerSearch'
          style: deepObject
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetSearchResponse'
          description: Dataset search results
        '401':
          $ref: '#/components/responses/unauthorised'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/unprocessable_entity'
      security:
        - api_key: []
      summary: Page results from a UserSearch — outer SQL chunk + inner resource Flop
      tags:
        - Datasets
