    DatasetSearchResponse:
      description: |
        Double-paginated dataset search results scoped to a `UserSearch`. The
        `meta` object carries two `Flop.Meta`-shaped sub-objects:

        - `sql` — outer page over `search_results` (up to 1000 dataset IDs per
          chunk; cap dictated by Postgres' `WHERE id IN (^ids)` plan). `null`
          when the request was not bound to a `user_search_id`.
        - `flop` — inner Flop page over the resource (default 20 rows).
      example:
        data:
          - id: 018f1234-5678-7abc-def0-123456789abc
            name: John Doe
            status: active
        meta:
          flop:
            page: 1
            page_size: 20
            total_count: 1000
            total_pages: 50
          sql:
            page: 1
            page_size: 1000
            total_count: 42000
            total_pages: 42
        user_search:
          error_message: null
          generic_table_id: null
          id: 018f1234-5678-7abc-def0-123456789abc
          resource_type: patient
          results_count: 42000
          search_query: gender = 'male'
          status: completed
      properties:
        data:
          description: Array of dataset records
          items:
            additionalProperties: true
            type: object
          type: array
        meta:
          description: Two-tier pagination metadata
          properties:
            flop:
              $ref: '#/components/schemas/PaginationMeta'
            sql:
              description: Outer page over search_results — null when no UserSearch bound
              oneOf:
                - $ref: '#/components/schemas/PaginationMeta'
                - type: 'null'
          required:
            - flop
          type: object
        user_search:
          $ref: '#/components/schemas/UserSearchResponse'
      required:
        - user_search
        - data
        - meta
      title: DatasetSearchResponse
      type: object
    DataActivationClientS3CallRequest:
      allOf:
