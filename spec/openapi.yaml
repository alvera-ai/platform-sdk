          $ref: '#/components/responses/unauthorised'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
      security:
        - bearer_token: []
      summary: Confirm a user (admin bypass)
      tags:
        - Admin
